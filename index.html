<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="etch-a-sketch.js" defer></script>
    <title>Etch-a-Sketch</title>
</head>
    
<body>
    <div class="content">
        <div class="sketch-content">
            <div class="ui-content">
                <h1>Etch-a-Sketch</h1>

                
                <div class="palette"> 
                    <button>Resize</button>
                    <div class="pickers">
                        <input type="color" class="color-picker">
                        <input type="range" class="alpha-picker" min="0" max="1" step="0.01" >
                    </div>
                    <div class="brushes">
                        <button class="brush">🖌️</button>
                        <button class="erase">⬜️</button>
                        <button class="random">🎲</button>
                    </div>
                </div>
            </div>
            <div class="grid-wrapper">
                <div class="grid"></div>
            </div>
        </div>
        <footer>Copyright © Seth Martineau 2023</footer>
    </div>
</body>
</html>
